version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: uk_grocery_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pos_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pos_password}
      POSTGRES_DB: ${POSTGRES_DB:-pos_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: uk_grocery_redis
    restart: always
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uk_grocery_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-pos_user}:${POSTGRES_PASSWORD:-pos_password}@db:5432/${POSTGRES_DB:-pos_db}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-pos_user}:${POSTGRES_PASSWORD:-pos_password}@db:5432/${POSTGRES_DB:-pos_db}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-secret-key-in-production}
      - DEBUG=${DEBUG:-False}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://localhost:5173}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,nginx}
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - db
      - redis
    networks:
      - app-network

  storefront:
    build:
      context: ./storefront
      dockerfile: Dockerfile
    container_name: uk_grocery_storefront
    restart: always
    networks:
      - app-network

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: uk_grocery_admin
    restart: always
    networks:
      - app-network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: uk_grocery_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - storefront
      - admin
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
