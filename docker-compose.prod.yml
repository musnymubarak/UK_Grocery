# Production overrides — pre-built static files, no dev servers
services:
  backend:
    volumes:
      - /app
      - upload_data:/app/uploads
    command: sh -c "(alembic upgrade head || true) && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

  postgres:
    # Disable host port mapping in production for security
    ports: []

  admin:
    # In production, admin is built at image build time.
    # Nginx reads the dist files directly from the image via named volume.
    volumes:
      - admin_dist:/usr/share/nginx/html
    command: ["true"]
    restart: "no"
    healthcheck:
      disable: true

  storefront:
    volumes:
      - storefront_dist:/usr/share/nginx/html
    command: ["true"]
    restart: "no"
    healthcheck:
      disable: true

  nginx:
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - admin_dist:/usr/share/nginx/html/admin:ro
      - storefront_dist:/usr/share/nginx/html:ro
      - upload_data:/data/uploads:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
      - admin
      - storefront

  # Certbot for SSL certificate management
  certbot:
    image: certbot/certbot
    container_name: grocery_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot

  # Database backup service
  db-backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    container_name: grocery_db_backup
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      AZURE_STORAGE_ACCOUNT: ${AZURE_STORAGE_ACCOUNT}
      AZURE_STORAGE_KEY: ${AZURE_STORAGE_KEY}
      AZURE_STORAGE_CONTAINER: ${AZURE_STORAGE_CONTAINER}
      HEALTHCHECKS_PING_URL: ${HEALTHCHECKS_PING_URL}
    volumes:
      - postgres_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "pgrep", "crond" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  admin_dist:
    driver: local
  storefront_dist:
    driver: local
  upload_data:
    driver: local
  postgres_backups:
    driver: local
  certbot_certs:
    driver: local
  certbot_www:
    driver: local
