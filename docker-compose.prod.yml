# Production overrides — pre-built static files, no dev servers
services:
  # One-shot migration runner
  migrations:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-0826}@db:5432/${POSTGRES_DB:-daily_grocer}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-0826}@db:5432/${POSTGRES_DB:-daily_grocer}
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: "no"

  backend:
    volumes:
      - /app
      - ./backend/uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    depends_on:
      migrations:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  db:
    # Disable host port mapping in production for security
    ports: []
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pos_user} -d ${POSTGRES_DB:-pos_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G

  admin:
    # In production, admin is built at image build time.
    # Nginx reads the dist files directly from the image via named volume.
    volumes:
      - admin_dist:/usr/share/nginx/html
    command: [ "true" ]
    restart: "no"
    healthcheck:
      disable: true

  storefront:
    volumes:
      - storefront_dist:/usr/share/nginx/html
    command: [ "true" ]
    restart: "no"
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  nginx:
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - admin_dist:/usr/share/nginx/html/admin:ro
      - storefront_dist:/usr/share/nginx/html
      - ./backend/uploads:/data/uploads:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
      - admin
      - storefront
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  redis:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    command: celery -A app.core.celery_app worker --loglevel=info
    depends_on:
      - redis
      - db
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    command: celery -A app.core.celery_app beat --loglevel=info
    depends_on:
      - redis
      - db
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # Certbot for SSL certificate management
  certbot:
    image: certbot/certbot
    container_name: grocery_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot

  # Database backup service
  db-backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    container_name: grocery_db_backup
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      AZURE_STORAGE_ACCOUNT: ${AZURE_STORAGE_ACCOUNT}
      AZURE_STORAGE_KEY: ${AZURE_STORAGE_KEY}
      AZURE_STORAGE_CONTAINER: ${AZURE_STORAGE_CONTAINER}
      HEALTHCHECKS_PING_URL: ${HEALTHCHECKS_PING_URL}
    volumes:
      - postgres_backups:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "pgrep", "crond" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  admin_dist:
    driver: local
  storefront_dist:
    driver: local
  postgres_backups:
    driver: local
  certbot_certs:
    driver: local
  certbot_www:
    driver: local
