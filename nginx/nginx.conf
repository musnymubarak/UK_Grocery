# Redirect HTTP to HTTPS
server {
    listen 80 default_server;
    server_name dailygrocer.co.uk www.dailygrocer.co.uk admin.dailygrocer.co.uk;
    return 301 https://$host$request_uri;
}

# Block Raw IP access
server {
    listen 80;
    listen 443 ssl default_server;
    server_name _;
    ssl_reject_handshake on; # Block SSL handshake for unknown domains
    return 444; 
}

# Storefront & API - HTTPS
server {
    listen 443 ssl;
    server_name dailygrocer.co.uk www.dailygrocer.co.uk;

    ssl_certificate /etc/letsencrypt/live/dailygrocer.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dailygrocer.co.uk/privkey.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Storefront - Frontend
    location / {
        proxy_pass http://storefront:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static Uploads
    location /uploads/ {
        proxy_pass http://backend:8000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Admin Portal - HTTPS
server {
    listen 443 ssl;
    server_name admin.dailygrocer.co.uk;

    ssl_certificate /etc/letsencrypt/live/dailygrocer.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dailygrocer.co.uk/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://admin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
