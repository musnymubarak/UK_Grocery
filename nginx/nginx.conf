# High-Performance Nginx Configuration for Daily Grocer

# Optimization: Browser caching and compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

# Redirect HTTP to HTTPS
server {
    listen 80 default_server;
    server_name dailygrocer.co.uk www.dailygrocer.co.uk admin.dailygrocer.co.uk;
    return 301 https://$host$request_uri;
}

# Block Raw IP access
server {
    listen 80;
    listen 443 ssl http2 default_server;
    server_name _;
    ssl_reject_handshake on;
    return 444; 
}

# Storefront & API - HTTPS (Optimized with HTTP/2)
server {
    listen 443 ssl http2;
    server_name dailygrocer.co.uk www.dailygrocer.co.uk;

    ssl_certificate /etc/letsencrypt/live/dailygrocer.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dailygrocer.co.uk/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Storefront - Frontend with caching
    location / {
        proxy_pass http://storefront:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Performance: Header optimizations
        add_header Cache-Control "public, no-cache, must-revalidate";
    }

    # API - No caching for data
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static Uploads - Aggressive Caching
    location /uploads/ {
        proxy_pass http://backend:8000/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }
}

# Admin Portal - HTTPS (Optimized with HTTP/2)
server {
    listen 443 ssl http2;
    server_name admin.dailygrocer.co.uk;

    ssl_certificate /etc/letsencrypt/live/dailygrocer.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dailygrocer.co.uk/privkey.pem;

    location / {
        proxy_pass http://admin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "public, no-cache, must-revalidate";
    }

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
    }

    location /uploads/ {
        proxy_pass http://backend:8000/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }
}
